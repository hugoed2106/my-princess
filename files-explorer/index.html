<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Archivos - My Princess</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .cursor-pointer {
            cursor: pointer;
        }
        .cursor-default {
            cursor: default;
        }
        footer div {
            font-size: 0.75rem;
        }
    </style>
</head>
<body class="bg-[#0d1117] text-[#c9d1d9] font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        
        <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-[#30363d] pb-4 mb-6 gap-4">
            <div class="flex items-center space-x-2 text-xl flex-wrap">
                <i data-lucide="folder-git-2" class="text-[#58a6ff] w-6 h-6"></i>
                <a target="_blank" class="text-[#58a6ff] hover:underline font-semibold cursor-pointer">hugoed2106</a>
                <span class="text-[#8b949e]">/</span>
                <a onclick="navigateTo('')" target="_blank" class="text-[#58a6ff] hover:underline font-semibold cursor-pointer">my-princess</a>
                <span id="breadcrumbs" class="flex items-center space-x-2"></span>
            </div>
            <div class="text-xs text-[#8b949e] bg-[#21262d] px-3 py-1 rounded-full border border-[#30363d] self-start md:self-auto">
                Rama: <span class="text-[#f0f6fc] font-mono">main</span>
            </div>
        </div>

        <div id="status-message" class="text-center py-12 text-[#8b949e]">
            <i data-lucide="loader-2" class="animate-spin w-8 h-8 mx-auto mb-2 text-[#58a6ff]"></i>
            Explorando repositorio...
        </div>

        <div id="explorer-box" class="bg-[#161b22] border border-[#30363d] rounded-md overflow-hidden">
            <div class="bg-[#21262d] p-3 flex justify-between items-center border-b border-[#30363d] text-sm">
                <span class="text-[#8b949e] flex items-center gap-2">
                    <i data-lucide="git-branch" class="w-4 h-4 cursor-default"></i> Contenido del repositorio
                </span>
            </div>
            <div id="explorer-list" class="divide-y divide-[#30363d]">
                </div>
        </div>

    </div>

    <div id="preview-modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="relative bg-[#161b22] border border-[#30363d] max-w-3xl w-full max-h-[90vh] rounded-lg shadow-2xl flex flex-col overflow-hidden">
            
            <div class="bg-[#21262d] border-b border-[#30363d] p-4 flex justify-between items-center">
                <h3 id="modal-title" class="text-[#f0f6fc] font-medium truncate pr-4">Archivo</h3>
                <button onclick="closeModal()" class="text-[#8b949e] hover:text-white cursor-pointer transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div id="modal-content" class="p-6 overflow-auto flex items-start justify-center min-h-[200px] bg-[#0d1117] text-[#f0f6fc]">
                </div>
        </div>
    </div>

    <script>
        const OWNER = 'hugoed2106';
        const REPO = 'my-princess';
        
        let currentPath = '';

        // Tipos de archivos soportados y sus iconos correspondientes
        const fileExtensions = {
            // Imágenes
            'png': { type: 'image', icon: 'file-image', color: 'text-green-400' },
            'jpg': { type: 'image', icon: 'file-image', color: 'text-green-400' },
            'jpeg': { type: 'image', icon: 'file-image', color: 'text-green-400' },
            // Audio
            'mp3': { type: 'audio', icon: 'file-audio', color: 'text-purple-400' },
            'm4a': { type: 'audio', icon: 'file-audio', color: 'text-purple-400' },
            // Video
            'mp4': { type: 'video', icon: 'file-video', color: 'text-red-400' },
            // Código / Texto
            'html': { type: 'code', icon: 'file-code-2', color: 'text-orange-400' },
            'js': { type: 'code', icon: 'file-code-2', color: 'text-yellow-400' },
            'css': { type: 'code', icon: 'file-code-2', color: 'text-blue-400' }
        };

        // Leer la ruta inicial desde la URL (para que funcione GitHub Pages de manera limpia)
        function init() {
            const params = new URLSearchParams(window.location.search);
            currentPath = params.get('p') || '';
            fetchContents(currentPath);
        }

        function navigateTo(path) {
            currentPath = path;
            // Actualizar el parámetro '?p=' en la barra de direcciones sin recargar la página
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + (path ? `?p=${encodeURIComponent(path)}` : '');
            window.history.pushState({ path: path }, '', newUrl);
            fetchContents(path);
        }

        async function fetchContents(path) {
            showStatus('Cargando elementos...');
            updateBreadcrumbs(path);

            const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('No se pudo leer el contenido de esta ruta.');
                
                let items = await response.json();

                // >>> NUEVA LÍNEA: Filtrar para ocultar la carpeta o archivo 'files-explorer'
                items = items.filter(item => item.name !== 'files-explorer');

                // Ordenar: Carpetas primero, luego archivos
                items.sort((a, b) => b.type.localeCompare(a.type));

                renderExplorer(items, path);
                hideStatus();
            } catch (error) {
                showStatus(error.message, true);
            }
        }

        function renderExplorer(items, path) {
            const list = document.getElementById('explorer-list');
            list.innerHTML = '';

            document.getElementById('explorer-box').classList.remove('hidden');

            // Botón para subir de nivel (Volver atrás)
            if (path !== '') {
                const parentPath = path.substring(0, path.lastIndexOf('/'));
                const backRow = document.createElement('div');
                backRow.className = "flex items-center p-3 hover:bg-[#1f242c] cursor-pointer text-[#58a6ff] text-sm font-medium";
                backRow.innerHTML = `<i data-lucide="arrow-left" class="w-4 h-4 mr-3"></i> .. (Volver)`;
                backRow.onclick = () => navigateTo(parentPath);
                list.appendChild(backRow);
            }

            // Listar elementos
            items.forEach(item => {
                const row = document.createElement('div');
                row.className = "flex justify-between items-center p-3 hover:bg-[#1f242c] cursor-pointer text-sm text-[#c9d1d9]";
                
                let icon = 'file';
                let iconColor = 'text-[#8b949e]';
                const ext = item.name.split('.').pop().toLowerCase();

                if (item.type === 'dir') {
                    icon = 'folder';
                    iconColor = 'text-[#54a3ff]';
                } else if (fileExtensions[ext]) {
                    icon = fileExtensions[ext].icon;
                    iconColor = fileExtensions[ext].color;
                }

                row.innerHTML = `
                    <div class="flex items-center space-x-3 flex-1 min-w-0">
                        <i data-lucide="${icon}" class="${iconColor} w-4 h-4 shrink-0"></i>
                        <span class="hover:text-[#58a6ff] hover:underline truncate">${item.name}</span>
                    </div>
                    <div class="text-[#8b949e] text-xs text-right shrink-0">
                        ${item.type === 'dir' ? 'Carpeta' : formatBytes(item.size)}
                    </div>
                `;

                row.onclick = () => {
                    if (item.type === 'dir') {
                        navigateTo(item.path);
                    } else {
                        openPreview(item, ext);
                    }
                };

                list.appendChild(row);
            });

            lucide.createIcons();
        }

        // Visor multimedia inteligente
        async function openPreview(item, ext) {
            const modal = document.getElementById('preview-modal');
            const contentZone = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = item.name;

            contentZone.innerHTML = '<i data-lucide="loader-2" class="animate-spin w-8 h-8 text-[#58a6ff]"></i>';
            lucide.createIcons();

            modal.classList.remove('hidden');

            const fileMeta = fileExtensions[ext];
            const rawUrl = item.download_url;

            if (!fileMeta) {
                // Si el archivo no está soportado en previsualización directa
                contentZone.innerHTML = `
                    <div class="text-center p-4">
                        <i data-lucide="file-warning" class="w-12 h-12 text-yellow-500 mx-auto mb-3"></i>
                        <p class="text-sm mb-4">Este tipo de archivo no se puede previsualizar en vivo.</p>
                        <a href="${item.html_url}" target="_blank" class="bg-[#238636] hover:bg-[#2ea043] text-white text-xs font-semibold px-4 py-2 rounded inline-block">Ver en GitHub</a>
                    </div>`;
                lucide.createIcons();
                return;
            }

            // Inyección dependiendo del tipo de archivo detectado
            if (fileMeta.type === 'image') {
                contentZone.innerHTML = `<img src="${rawUrl}" alt="${item.name}" class="max-w-full max-h-[70vh] object-contain rounded">`;
            } 
            else if (fileMeta.type === 'audio') {
                contentZone.innerHTML = `
                    <div class="w-full max-w-md bg-[#21262d] p-6 rounded-lg border border-[#30363d] text-center">
                        <i data-lucide="music" class="w-12 h-12 text-purple-400 mx-auto mb-4 animate-pulse"></i>
                        <audio controls src="${rawUrl}" class="w-full mt-2"></audio>
                    </div>`;
            } 
            else if (fileMeta.type === 'video') {
                contentZone.innerHTML = `<video controls src="${rawUrl}" class="max-w-full max-h-[70vh] rounded"></video>`;
            } 
            else if (fileMeta.type === 'code') {
                try {
                    const res = await fetch(rawUrl);
                    const codeText = await res.text();
                    // Escapar caracteres HTML para evitar que el navegador los ejecute accidentalmente
                    const escapedCode = codeText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    contentZone.innerHTML = `<pre class="w-full text-left font-mono text-xs text-green-400 bg-[#0d1117] p-4 rounded border border-[#30363d] overflow-x-auto whitespace-pre-wrap select-text"><code>${escapedCode}</code></pre>`;
                } catch {
                    contentZone.innerHTML = `<p class="text-red-400 text-sm">Error al cargar el código fuente.</p>`;
                }
            }
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('preview-modal').classList.add('hidden');
            document.getElementById('modal-content').innerHTML = ''; // Detener audios/videos en reproducción
        }

        // Utilidades de interfaz
        function updateBreadcrumbs(path) {
            const crumbs = document.getElementById('breadcrumbs');
            crumbs.innerHTML = '';
            if (!path) return;

            const parts = path.split('/');
            let accumulatedPath = '';

            parts.forEach((part, index) => {
                accumulatedPath += (index === 0 ? '' : '/') + part;
                const isLast = index === parts.length - 1;
                
                const separator = document.createElement('span');
                separator.className = "text-[#8b949e]";
                separator.innerText = "/";
                crumbs.appendChild(separator);

                if (isLast) {
                    const span = document.createElement('span');
                    span.className = "text-[#f0f6fc] font-medium";
                    span.innerText = part;
                    crumbs.appendChild(span);
                } else {
                    const btn = document.createElement('button');
                    btn.className = "text-[#58a6ff] hover:underline font-medium";
                    btn.innerText = part;
                    const capturePath = accumulatedPath;
                    btn.onclick = () => navigateTo(capturePath);
                    crumbs.appendChild(btn);
                }
            });
        }

        function showStatus(message, isError = false) {
            const msg = document.getElementById('status-message');
            msg.classList.remove('hidden');
            msg.innerHTML = isError 
                ? `<i data-lucide="alert-circle" class="w-8 h-8 mx-auto mb-2 text-red-500"></i><span class="text-red-400">${message}</span>`
                : `<i data-lucide="loader-2" class="animate-spin w-8 h-8 mx-auto mb-2 text-[#58a6ff]"></i>${message}`;
            if(isError) document.getElementById('explorer-box').classList.add('hidden');
            lucide.createIcons();
        }

        function hideStatus() {
            document.getElementById('status-message').classList.add('hidden');
        }

        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        // Manejar el botón de retroceso nativo del navegador
        window.addEventListener('popstate', (e) => {
            const path = e.state ? e.state.path : '';
            fetchContents(path);
        });

        // Escuchar tecla escape para cerrar modales
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        // Inicializar el script
        init();
    </script>
</body>
<footer class="text-center text-xs text-[#8b949e] py-4 mt-8 border-t border-[#30363d] w-full">
    <div class="container mx-auto">
        <p>Página Web: <a href="https://hugoed2106.github.io/my-princess/" class="text-pink-500 hover:none bold">Her</a></p>
        <p>2025 - Hugo Elias.</p>
    </div>
</footer>
</html>
